<!DOCTYPE html>
<html>
<head>
<title>RIDoo Tracking 🚗</title>

<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<style>
*{box-sizing:border-box;font-family:"Segoe UI";margin:0;padding:0;}
body{background:#f4f6f8;}

.head{
height:120px;
background:linear-gradient(90deg,#232526,#414345);
color:#FFD700;
text-align:center;
padding-top:20px;
}

.navbar{
background:#111;
padding:14px;
text-align:center;
display:flex;
justify-content:center;
align-items:center;
gap:18px;
flex-wrap:wrap;
}

.navbar a{
color:white;
text-decoration:none;
font-size:17px;
font-weight:600;
letter-spacing:0.5px;
padding:6px 10px;
border-radius:6px;
}

.navbar a:hover{
color:#FFD700;
}

.goog-te-combo{
font-size:12px;
padding:2px;
border-radius:5px;
}

.track-box{
width:650px;
margin:60px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
text-align:center;
}

.driver{
background:#f9f9f9;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.status{
display:flex;
justify-content:space-between;
margin:20px 0;
font-size:14px;
}

.step{
width:30%;
padding:10px;
background:#eee;
border-radius:8px;
}

.active{
background:#FFD700;
}

.bar{
width:100%;
height:20px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-top:15px;
}

.progress{
height:100%;
width:0%;
background:#FFD700;
animation:move 6s linear infinite;
}

@keyframes move{
0%{width:0%;}
100%{width:100%;}
}

.info{
margin-top:15px;
font-size:15px;
}

.bottom-left{
position:fixed;
bottom:0;
left:0;
width:240px;
}

.bottom-right{
position:fixed;
bottom:0;
right:0;
width:240px;
}
</style>
</head>

<body>

<script>
function googleTranslateElementInit(){
new google.translate.TranslateElement(
{pageLanguage:'en',includedLanguages:'en,ta'},
'google_translate_element');
}
</script>

<div class="head">
<h1>RIDoo</h1>
<h4>Live Tracking 🚗</h4>
</div>

<nav class="navbar">
<a href="index.html"> Home</a>
<a href="bookingp.html"> Booking</a>
<a href="tracking.html"> Tracking</a>
<span id="google_translate_element"></span>
</nav>

<div class="track-box">

<h2>🚗 Your Ride is on the way</h2>

<div class="driver">
<p><b>Driver:</b> Rajesh Kumar</p>
<p><b>Vehicle:</b> TN 23 AB 4567 (Car)</p>
<p><b>Contact:</b> +91 9876543210</p>
</div>

<div class="status">
<div class="step active">Driver Assigned</div>
<div class="step active">On the Way</div>
<div class="step">Arriving</div>
</div>

<div class="bar">
<div class="progress"></div>
</div>

<div class="info">
<p>📍 Driver is 2 km away</p>
<p>⏰ Estimated Arrival: 5 mins</p>
</div>

</div>

<!-- ✅ MAP ADDED HERE -->
<div style="width:650px;margin:20px auto;">
    <iframe
        width="100%"
        height="300"
        style="border:0;border-radius:12px;"
        loading="lazy"
        src="https://maps.google.com/maps?q=Chennai&output=embed">
    </iframe>
</div>

<img src="wibg-removebg-preview.png" class="bottom-left">
<img src="wibgg-removebg-preview.png" class="bottom-right">

</body>
</html>
